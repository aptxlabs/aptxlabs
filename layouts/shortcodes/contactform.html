<form
  id="contact-form"
  action="https://contact-worker.faisal-a99.workers.dev"
  method="POST"
  class="contact-form"
  style="max-width: 600px; margin: 0 auto;"
>
  <input type="hidden" name="bot-field" />

  <div style="margin-bottom: 1rem;">
    <label for="name" style="display: block; font-weight: bold; margin-bottom: 0.5rem;">Name</label>
    <input
      type="text"
      id="name"
      name="name"
      required
      placeholder="Your name"
      style="width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px;"
    />
  </div>

  <div style="margin-bottom: 1rem;">
    <label for="email" style="display: block; font-weight: bold; margin-bottom: 0.5rem;">Email</label>
    <input
      type="email"
      id="email"
      name="email"
      required
      placeholder="Your email"
      style="width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px;"
    />
  </div>

  <div style="margin-bottom: 1rem;">
    <label for="message" style="display: block; font-weight: bold; margin-bottom: 0.5rem;">Message</label>
    <textarea
      id="message"
      name="message"
      rows="5"
      required
      placeholder="Your message"
      style="width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px;"
    ></textarea>
  </div>

  <!-- reCAPTCHA v2 Checkbox -->
  <div class="g-recaptcha" data-sitekey="6Le__Y0rAAAAAMsuTRGX6Qz6v6_e7Ogu8lcAuqUM" style="margin-bottom: 1rem;"></div>

  <!-- Submit button -->
  <button
    type="submit"
    style="background-color: #007bff; color: white; padding: 0.75rem 1.5rem; border: none; border-radius: 4px; cursor: pointer;"
  >
    Send Message
  </button>

  <!-- Status message -->
  <div id="form-status" style="margin-top: 1rem; font-weight: bold;"></div>
</form>

<!-- Load reCAPTCHA -->
<script src="https://www.google.com/recaptcha/api.js" async defer></script>

<!-- Submission handling -->
<script>
  const form = document.getElementById("contact-form");
  const status = document.getElementById("form-status");

  form.addEventListener("submit", async function (e) {
    e.preventDefault();
    status.textContent = "Sending...";
    status.style.color = "#555";

    const formData = new FormData(form);
    const token = grecaptcha.getResponse();

    if (!token) {
      status.textContent = "Please complete the reCAPTCHA.";
      status.style.color = "#dc3545";
      return;
    }

    formData.append("g-recaptcha-response", token);

    try {
      const response = await fetch(form.action, {
        method: "POST",
        body: formData,
      });

      const text = await response.text(); // Read response body for keyword check

      if (response.ok && text.toLowerCase().includes("message sent")) {
        status.textContent = "✅ Message sent successfully!";
        status.style.color = "#28a745";
        form.reset();
        grecaptcha.reset();
      } else {
        throw new Error("Unexpected response");
      }
    } catch (err) {
      status.textContent = "❌ Failed to send message. Please try again.";
      status.style.color = "#dc3545";
    }
  });
</script>
