<form
  id="contact-form"
  action="https://contact-worker.faisal-a99.workers.dev"
  method="POST"
  class="contact-form"
  style="max-width: 600px; margin: 0 auto;"
>
  <input type="hidden" name="bot-field" />

  <div style="margin-bottom: 1rem;">
    <label for="name">Name</label>
    <input type="text" id="name" name="name" required placeholder="Your name" />
  </div>

  <div style="margin-bottom: 1rem;">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" required placeholder="Your email" />
  </div>

  <div style="margin-bottom: 1rem;">
    <label for="message">Message</label>
    <textarea id="message" name="message" rows="5" required placeholder="Your message"></textarea>
  </div>

  <div class="g-recaptcha" data-sitekey="6Le__Y0rAAAAAMsuTRGX6Qz6v6_e7Ogu8lcAuqUM" style="margin-bottom: 1rem;"></div>

  <button type="submit">Send Message</button>

  <div id="form-status" style="margin-top: 1rem;"></div>
</form>

<script src="https://www.google.com/recaptcha/api.js" async defer></script>

<script>
  const form = document.getElementById("contact-form");
  const status = document.getElementById("form-status");

  form.addEventListener("submit", async function (e) {
    e.preventDefault();
    status.textContent = "Sending...";
    status.style.color = "#555";

    const formData = new FormData(form);
    const token = grecaptcha.getResponse();

    if (!token) {
      status.textContent = "Please complete the reCAPTCHA.";
      status.style.color = "#dc3545";
      return;
    }

    formData.append("g-recaptcha-response", token);

    try {
      const response = await fetch(form.action, {
        method: "POST",
        body: formData,
      });

      const responseText = await response.text();
      console.log("Response status:", response.status);
      console.log("Response body:", responseText);

      if (response.ok) {
        status.textContent = "✅ Message sent successfully!";
        status.style.color = "#28a745";
        form.reset();
        grecaptcha.reset();
      } else {
        status.textContent = "❌ Failed: " + responseText;
        status.style.color = "#dc3545";
      }
    } catch (error) {
      console.error("Submission error:", error);
      status.textContent = "❌ Error: " + error.message;
      status.style.color = "#dc3545";
    }
  });
</script>
